<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCheck GST | Invoice PDF to Excel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-screen overflow-hidden bg-slate-950 text-slate-100">
  <div class="pointer-events-none absolute inset-0 -z-10 bg-[radial-gradient(circle_at_top,#0f172a_20%,#020617_70%),radial-gradient(circle_at_80%_30%,rgba(30,64,175,0.35),transparent_45%),radial-gradient(circle_at_20%_80%,rgba(185,28,28,0.15),transparent_40%)]"></div>

  <main class="flex h-screen w-full items-center justify-center px-4">
    <div class="w-full max-w-[900px]">
      <form id="uploadForm" class="rounded-3xl border border-dashed border-white/20 bg-slate-900/65 p-6 shadow-2xl backdrop-blur-xl transition sm:p-10">
        <div class="text-center">
          <div class="mx-auto mb-4 inline-flex h-10 w-10 items-center justify-center rounded-xl border border-white/20 bg-white/5 text-lg">📄</div>
          <h1 class="text-2xl font-semibold tracking-tight text-white sm:text-3xl">Convert GST Invoice to Excel</h1>
          <p class="mt-2 text-sm text-slate-300 sm:text-base">Drag and drop your PDF or select a file</p>
        </div>

        <div id="dropZone" class="group mt-8 rounded-2xl border border-dashed border-white/20 bg-slate-950/30 p-8 text-center transition duration-300 hover:border-blue-400/70 hover:shadow-[0_0_0_1px_rgba(96,165,250,0.45),0_0_35px_rgba(59,130,246,0.2)] sm:p-12">
          <input id="invoiceFile" name="invoiceFile" type="file" accept="application/pdf,.pdf" class="hidden" required />
          <div id="dropPrompt" class="space-y-3">
            <div class="text-4xl">⬆️</div>
            <p class="text-lg font-medium text-white">Drag &amp; drop your invoice PDF</p>
            <p class="text-sm text-slate-400">or</p>
          </div>

          <div id="fileSuccess" class="hidden space-y-2">
            <p class="text-base font-semibold text-emerald-300">✅ <span id="fileName"></span></p>
            <p class="text-sm text-emerald-200/80">✅ <span id="fileSize"></span></p>
          </div>

          <button id="pickFileButton" type="button" class="mt-6 inline-flex items-center justify-center rounded-lg bg-blue-600 px-6 py-3 text-base font-semibold text-white transition hover:bg-blue-500 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:ring-offset-2 focus:ring-offset-slate-950">
            Select a file
          </button>
        </div>

        <div class="mt-5 flex items-center justify-center gap-2 text-xs text-slate-300 sm:text-sm">
          <span class="text-slate-400">Output:</span>
          <label class="cursor-pointer rounded-md border border-white/20 px-3 py-1.5 transition has-[:checked]:border-blue-300 has-[:checked]:bg-blue-500/20 has-[:checked]:text-blue-100">
            <input class="sr-only" type="radio" name="outputFormat" value="xlsx" checked />
            Excel
          </label>
          <label class="cursor-pointer rounded-md border border-white/20 px-3 py-1.5 transition has-[:checked]:border-blue-300 has-[:checked]:bg-blue-500/20 has-[:checked]:text-blue-100">
            <input class="sr-only" type="radio" name="outputFormat" value="xml" />
            Tally XML
          </label>
        </div>

        <div class="mt-6 flex justify-center">
          <button id="convertButton" type="submit" class="inline-flex min-w-40 items-center justify-center gap-2 rounded-lg border border-white/20 bg-white/10 px-5 py-2.5 text-sm font-medium text-slate-100 transition hover:bg-white/15 disabled:cursor-not-allowed disabled:opacity-50" disabled>
            <span id="submitSpinner" class="hidden h-4 w-4 animate-spin rounded-full border-2 border-white/30 border-t-white"></span>
            <span id="convertLabel">Convert</span>
          </button>
        </div>

        <p id="statusMessage" role="status" aria-live="polite" class="mt-4 text-center text-sm text-slate-300"></p>
      </form>

      <p class="mt-4 text-center text-xs text-slate-400">Your file is securely processed and not stored</p>
    </div>
  </main>

  <script src="./script.js"></script>
</body>
</html>
