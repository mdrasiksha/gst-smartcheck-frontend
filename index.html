<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCheck GST | Premium Invoice Converter</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
  <div class="pointer-events-none fixed inset-0 -z-10 bg-[radial-gradient(ellipse_at_top,_rgba(37,99,235,0.35),_transparent_55%),radial-gradient(ellipse_at_85%_10%,_rgba(79,70,229,0.28),_transparent_45%),linear-gradient(180deg,_#020617_0%,_#0f172a_60%,_#020617_100%)]"></div>

  <header class="mx-auto w-full max-w-[900px] px-4 pt-6">
    <nav class="flex items-center justify-between rounded-2xl border border-white/10 bg-slate-900/60 px-4 py-3 shadow-lg backdrop-blur-xl">
      <div class="flex items-center gap-3">
        <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-blue-500 to-indigo-500 text-sm font-bold text-white">SC</div>
        <span class="text-sm font-semibold tracking-wide text-slate-100">SmartCheck GST</span>
      </div>
      <a
        id="navGetProButton"
        href="https://wa.me/918722250407?text=Hi,%20I%27m%20interested%20in%20the%20GST%20SmartCheck%20Pro%20Plan."
        target="_blank"
        rel="noopener noreferrer"
        class="rounded-xl border border-emerald-400/30 bg-emerald-500/20 px-4 py-2 text-sm font-semibold text-emerald-200 transition duration-200 hover:-translate-y-0.5 hover:bg-emerald-500/30"
      >
        Get Pro
      </a>
    </nav>
  </header>

  <main class="mx-auto w-full max-w-[900px] px-4 pb-16 pt-8">
    <section class="rounded-3xl border border-white/10 bg-gradient-to-br from-slate-900/90 via-slate-900/70 to-blue-950/70 px-6 py-10 shadow-2xl shadow-blue-950/40 backdrop-blur-xl sm:px-10">
      <div class="flex items-center gap-3">
        <span class="rounded-full border border-cyan-300/30 bg-cyan-400/10 px-3 py-1 text-xs font-semibold tracking-wide text-cyan-200">Beta</span>
        <span id="remainingPill" class="rounded-full border border-white/15 bg-white/5 px-3 py-1 text-xs font-medium text-slate-200">10 free invoices remaining</span>
      </div>
      <h1 class="mt-6 text-3xl font-bold tracking-tight text-white sm:text-4xl">Upload GST Invoice</h1>
      <p class="mt-3 max-w-xl text-base text-slate-300">Convert to Excel or Tally XML instantly</p>
    </section>

    <section class="mt-8 rounded-2xl border border-white/10 bg-white/5 p-6 shadow-2xl shadow-black/30 backdrop-blur-2xl sm:p-8">
      <form id="uploadForm" novalidate class="space-y-6">
        <div class="border-b border-white/10 pb-6">
          <label
            for="invoiceFile"
            id="dropzone"
            class="group relative flex min-h-[220px] cursor-pointer flex-col items-center justify-center rounded-2xl border-2 border-dashed border-slate-500/70 bg-slate-900/40 px-6 text-center transition duration-200 hover:border-blue-400/70 hover:bg-slate-900/70"
          >
            <input type="file" id="invoiceFile" name="invoiceFile" accept="application/pdf,.pdf" required class="sr-only" />
            <div class="mb-4 rounded-2xl border border-white/10 bg-white/5 p-4 text-blue-200 transition group-hover:scale-105">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 15.75a4.5 4.5 0 004.5 4.5h9a4.5 4.5 0 001.119-8.858 5.25 5.25 0 00-10.61-1.341A3.75 3.75 0 003 13.5" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 12v7.5m0-7.5l-3 3m3-3l3 3" />
              </svg>
            </div>
            <p class="text-lg font-semibold text-white">Drag &amp; drop your invoice PDF</p>
            <p class="mt-1 text-sm text-slate-300">or click to browse</p>
            <p class="mt-4 text-xs text-slate-400">PDF only • Up to 10MB</p>
          </label>

          <div id="filePreview" class="mt-4 hidden rounded-xl border border-blue-400/25 bg-blue-500/10 px-4 py-3">
            <p class="text-xs font-semibold uppercase tracking-wider text-blue-200">Selected file</p>
            <p id="fileName" class="mt-1 truncate text-sm font-medium text-white"></p>
            <p id="fileSize" class="mt-1 text-xs text-slate-300"></p>
          </div>
        </div>

        <div class="border-b border-white/10 pb-6 space-y-5">
          <div>
            <label for="email" class="mb-2 block text-sm font-semibold text-slate-200">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              autocomplete="email"
              placeholder="name@company.com"
              class="w-full rounded-xl border border-white/15 bg-slate-900/60 px-4 py-3 text-sm text-white outline-none transition duration-200 placeholder:text-slate-500 focus:border-blue-400 focus:ring-4 focus:ring-blue-500/20"
            />
          </div>

          <div>
            <p class="mb-2 text-sm font-semibold text-slate-200">Output format</p>
            <div class="grid grid-cols-2 gap-2 rounded-xl border border-white/10 bg-slate-900/60 p-1">
              <label class="cursor-pointer rounded-lg px-4 py-2 text-center text-sm font-medium text-slate-300 transition has-[:checked]:bg-gradient-to-r has-[:checked]:from-blue-500 has-[:checked]:to-indigo-500 has-[:checked]:text-white has-[:checked]:shadow">
                <input type="radio" name="outputFormat" value="xlsx" class="sr-only" checked />
                Excel
              </label>
              <label class="cursor-pointer rounded-lg px-4 py-2 text-center text-sm font-medium text-slate-300 transition has-[:checked]:bg-gradient-to-r has-[:checked]:from-blue-500 has-[:checked]:to-indigo-500 has-[:checked]:text-white has-[:checked]:shadow">
                <input type="radio" name="outputFormat" value="xml" class="sr-only" />
                Tally XML
              </label>
            </div>
          </div>
        </div>

        <button
          id="submitButton"
          type="submit"
          class="flex w-full items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-blue-500 to-indigo-600 px-4 py-3 text-sm font-semibold text-white shadow-lg shadow-indigo-950/40 transition duration-200 hover:-translate-y-0.5 hover:from-blue-400 hover:to-indigo-500 active:translate-y-0 disabled:cursor-not-allowed disabled:opacity-60"
        >
          <span id="submitSpinner" class="hidden h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"></span>
          <span id="submitButtonText">Convert Invoice</span>
        </button>
      </form>

      <p id="statusMessage" class="mt-4 text-sm" role="status" aria-live="polite"></p>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
